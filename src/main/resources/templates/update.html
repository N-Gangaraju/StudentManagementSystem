<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Student</title>
<link rel="stylesheet" th:href="@{/css/update.css}">
</head>
<body>

<div class="container">

    <h1>✏️ Update Student</h1>

    <form th:action="@{/update}" method="post">

        <label>Student ID</label>
        <input type="number" name="id" placeholder="Enter Student ID" required>

        <label>Student Name</label>
        <input type="text" name="name" placeholder="Enter Student Name" required>

        <label>Marks</label>
        <input type="number" name="marks" placeholder="Enter Marks" required>

        <button type="submit">Update Student</button>

    </form>

    <br>

    <a th:href="@{/}" class="back-btn">🏠 Back to Home</a>

</div>

</body>
</html>
